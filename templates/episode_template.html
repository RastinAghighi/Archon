<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Episode {{ episode_num }}: {{ topic_name }}</title>
    <link rel="stylesheet" href="episode_style.css">
</head>
<body>

    <div class="header-bar">
        <h1 class="header-title">ARCHON &mdash; Episode {{ episode_num }}: {{ topic_name }}</h1>
        <div class="header-meta">
            <span class="meta-date">{{ date }}</span>
            <span class="meta-separator">&bull;</span>
            <span class="meta-phase">Phase: {{ phase }}</span>
            <span class="meta-separator">&bull;</span>
            <span class="meta-category">{{ category }}</span>
        </div>
    </div>

    <div class="content">
        {{ content_html }}
    </div>

    <div class="footer">
        <span class="footer-text">Generated by Archon &mdash; AI Learning System</span>
    </div>

</body>
</html>
